name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.0"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e '.[dev]'

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Pytest
        env:
          ADMIN_TOKEN: test-admin-token-1234567890abcdef
          APP_ENV: development
        run: uv run pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pear-autoreplies:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the built image
        run: |
          docker run --rm \
            -e ADMIN_TOKEN=test-admin-token-1234567890abcdef \
            pear-autoreplies:ci \
            python -c "from autoreplies.main import app; print('app routes:', len(app.routes))"
